<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aether Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0a1e;
            --primary: #9d50bb;
            --primary-light: #bc78ec;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body { width: 100%; height: 100dvh; background: var(--bg-dark); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; position: fixed; }

        .screen { width: 100%; height: 100dvh; display: flex; position: fixed; top: 0; left: 0; background: radial-gradient(circle at top right, #2d1b4e, #0f0a1e); z-index: 10; }
        .hidden { display: none !important; }

        /* АНИМАЦИИ */
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* АВТОРИЗАЦИЯ */
        #auth-screen { justify-content: center; align-items: center; padding: 20px; }
        .auth-card {
            background: rgba(45, 27, 78, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 35px 25px; border-radius: 32px;
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; gap: 20px;
            animation: pop 0.4s ease-out;
        }
        .auth-header h1 { font-size: 2.8rem; background: linear-gradient(to bottom, #fff, var(--primary-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        
        input, select { 
            width: 100%; height: 55px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; 
            padding: 0 15px; color: #fff; font-size: 16px; outline: none;
        }
        .btn-main { width: 100%; height: 55px; background: linear-gradient(135deg, var(--primary), #7b2ff7); border: none; border-radius: 18px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .btn-sec { width: 100%; background: transparent; border: 1px solid var(--glass-border); color: #fff; height: 50px; border-radius: 18px; cursor: pointer; }

        /* ПРИЛОЖЕНИЕ */
        .sidebar { 
            width: 100%; height: 100%; position: absolute; left: 0; top: 0;
            background: var(--bg-dark); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20;
        }
        #app-screen.chat-open .sidebar { transform: translateX(-100%); }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { 
            padding: 15px; border-radius: 20px; margin-bottom: 8px; background: rgba(255,255,255,0.03); 
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
            animation: slideIn 0.3s ease-out;
        }

        /* ПРОФИЛЬ */
        .user-profile-bar {
            height: 75px; background: rgba(255,255,255,0.05); border-top: 1px solid var(--glass-border);
            display: flex; align-items: center; padding: 0 15px; gap: 12px; cursor: pointer;
        }
        .avatar-circle { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .settings-icon { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; position: relative; }
        .settings-icon::after { content: ''; position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* ЧАТ */
        .chat-area { width: 100%; height: 100%; position: absolute; left: 0; top: 0; display: flex; flex-direction: column; background: var(--bg-dark); z-index: 10; }
        .chat-header { height: 70px; padding: 0 15px; display: flex; align-items: center; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass-border); justify-content: space-between; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; animation: slideIn 0.2s ease-out; position: relative; word-wrap: break-word; }
        .msg-sender { font-size: 0.7rem; opacity: 0.6; margin-bottom: 4px; display: block; }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }

        .message-input-area { 
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px; 
            padding: 10px 10px 25px 10px; display: flex; gap: 8px; background: var(--bg-dark); 
            border-top: 1px solid var(--glass-border); z-index: 40;
            transform: translateY(100%); opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .message-input-area.visible { transform: translateY(0); opacity: 1; pointer-events: all; }

        /* МОДАЛКИ */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content {
            background: #1a142e; border: 1px solid var(--glass-border); width: 90%; max-width: 320px;
            padding: 25px; border-radius: 28px; display: flex; flex-direction: column; gap: 15px;
            animation: pop 0.3s ease-out;
        }

        @media (min-width: 769px) {
            .sidebar { width: 320px; position: relative; transform: none !important; }
            .chat-area { width: auto; flex: 1; position: relative; }
        }
    </style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-card">
        <div class="auth-header"><h1>Aether</h1></div>
        <div class="auth-form">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Пароль">
            <button id="btn-login-action" class="btn-main">Войти</button>
            <button id="btn-reg-action" class="btn-sec">Регистрация</button>
        </div>
    </div>
</div>

<div id="app-screen" class="screen hidden">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="font-weight:bold; font-size:1.2rem;">Aether</div>
            <button id="btn-plus-menu" class="btn-sec" style="width:40px;height:40px;">+</button>
        </div>
        <div id="chat-list" class="chat-list"></div>
        <div class="user-profile-bar" id="open-settings">
            <div class="avatar-circle" id="profile-avatar">?</div>
            <div class="user-info">
                <div id="profile-name" class="name">...</div>
                <div id="profile-status-text" style="font-size:0.75rem; opacity:0.6;">В сети</div>
            </div>
            <div class="settings-icon"></div>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div style="display:flex; align-items:center;">
                <button id="btn-back" style="background:none; border:none; color:white; font-size:1.8rem; margin-right:10px;">←</button>
                <div>
                    <div id="chat-with-name" style="font-weight:500;">Выберите чат</div>
                    <div id="typing-indicator" style="font-size:0.7rem; color:var(--primary-light); height:12px;"></div>
                </div>
            </div>
            <button id="btn-chat-opts" class="hidden" style="background:none; border:none; color:white; font-size:1.2rem;">⋮</button>
        </div>
        <div id="messages-container" class="messages-container"></div>
        <form id="message-form" class="message-input-area">
            <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" style="width:45px; height:45px; border-radius:12px; background:var(--primary-light); border:none; color:white; font-weight:bold;">></button>
        </form>
    </div>
</div>

<div id="settings-modal" class="modal hidden">
    <div class="modal-content">
        <h3 style="text-align:center;">Настройки</h3>
        <input type="text" id="edit-display-name" placeholder="Ваше имя">
        <input type="text" id="edit-status" placeholder="Статус (например: Сплю)">
        <label style="font-size:0.8rem; opacity:0.6;">Цвет темы:</label>
        <select id="theme-color">
            <option value="#9d50bb">Фиолетовый</option>
            <option value="#2ecc71">Зеленый</option>
            <option value="#e74c3c">Красный</option>
            <option value="#3498db">Синий</option>
        </select>
        <button id="btn-save-profile" class="btn-main">Сохранить</button>
        <button id="btn-logout" class="btn-sec" style="color:#ff5555; border-color:#ff5555;">Выйти</button>
        <button onclick="this.closest('.modal').classList.add('hidden')" class="btn-sec">Закрыть</button>
    </div>
</div>

<div id="plus-modal" class="modal hidden">
    <div class="modal-content">
        <button id="btn-new-private" class="btn-main">Личный чат</button>
        <button id="btn-new-group" class="btn-main">Создать группу</button>
        <button onclick="this.closest('.modal').classList.add('hidden')" class="btn-sec">Отмена</button>
    </div>
</div>

<div id="group-opts-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="opts-title">Группа</h3>
        <button id="btn-add-member" class="btn-main">Добавить участника</button>
        <button id="btn-leave-group" class="btn-sec" style="color:#ff5555;">Выйти из группы</button>
        <button onclick="this.closest('.modal').classList.add('hidden')" class="btn-sec">Закрыть</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp, setDoc, doc, deleteDoc, getDocs, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAQ48D6o7kr-JgifJTwKhWx45zWoHlleZQ",
        authDomain: "aether-1a555.firebaseapp.com",
        projectId: "aether-1a555",
        storageBucket: "aether-1a555.firebasestorage.app",
        messagingSenderId: "798141171445",
        appId: "1:798141171445:web:ba604aee38141e14d727bc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null, activeChatId = null, unsubMsgs = null, currentChatData = null;

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            document.getElementById('profile-name').innerText = user.displayName || user.email;
            document.getElementById('profile-avatar').innerText = (user.displayName || user.email)[0].toUpperCase();
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            loadChats();
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }
    });

    // Настройки
    document.getElementById('open-settings').onclick = () => document.getElementById('settings-modal').classList.remove('hidden');
    document.getElementById('btn-save-profile').onclick = async () => {
        const name = document.getElementById('edit-display-name').value;
        const color = document.getElementById('theme-color').value;
        const statusText = document.getElementById('edit-status').value;
        if(name) await updateProfile(auth.currentUser, { displayName: name });
        document.documentElement.style.setProperty('--primary', color);
        document.getElementById('profile-status-text').innerText = statusText || "В сети";
        document.getElementById('settings-modal').classList.add('hidden');
        location.reload();
    };

    // Создание чатов/групп
    document.getElementById('btn-plus-menu').onclick = () => document.getElementById('plus-modal').classList.remove('hidden');
    
    document.getElementById('btn-new-private').onclick = async () => {
        const email = prompt("Email собеседника:");
        if(!email) return;
        const id = [currentUser.email, email.trim()].sort().join('_').replace(/\./g, ',');
        await setDoc(doc(db, "chats", id), { users: [currentUser.email, email.trim()], type: 'private', time: serverTimestamp() });
        document.getElementById('plus-modal').classList.add('hidden');
    };

    document.getElementById('btn-new-group').onclick = async () => {
        const name = prompt("Название группы:");
        if(!name) return;
        await addDoc(collection(db, "chats"), { name, users: [currentUser.email], type: 'group', time: serverTimestamp() });
        document.getElementById('plus-modal').classList.add('hidden');
    };

    function loadChats() {
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", currentUser.email)), snap => {
            const list = document.getElementById('chat-list'); list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const isGroup = data.type === 'group';
                const chatName = isGroup ? data.name : data.users.find(u => u !== currentUser.email);
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.innerHTML = `<div><strong>${isGroup ? '👥 ' : ''}${chatName}</strong></div>`;
                item.onclick = () => openChat(d.id, chatName, data);
                list.appendChild(item);
            });
        });
    }

    function openChat(id, name, data) {
        activeChatId = id; currentChatData = data;
        document.getElementById('app-screen').classList.add('chat-open');
        document.getElementById('chat-with-name').innerText = name;
        document.getElementById('message-form').classList.add('visible');
        document.getElementById('btn-chat-opts').classList.toggle('hidden', data.type !== 'group');

        if(unsubMsgs) unsubMsgs();
        unsubMsgs = onSnapshot(query(collection(db, "chats", id, "messages"), orderBy("timestamp", "asc")), snap => {
            const cont = document.getElementById('messages-container'); cont.innerHTML = '';
            snap.forEach(m => {
                const d = m.data();
                const div = document.createElement('div');
                div.className = `msg ${d.sender === currentUser.email ? 'sent' : 'received'}`;
                div.innerHTML = `<span class="msg-sender">${d.sender}</span>${d.text}`;
                cont.appendChild(div);
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    document.getElementById('btn-chat-opts').onclick = () => {
        document.getElementById('opts-title').innerText = currentChatData.name;
        document.getElementById('group-opts-modal').classList.remove('hidden');
    };

    document.getElementById('btn-add-member').onclick = async () => {
        const email = prompt("Email нового участника:");
        if(email) await updateDoc(doc(db, "chats", activeChatId), { users: arrayUnion(email.trim()) });
    };

    document.getElementById('btn-leave-group').onclick = async () => {
        if(confirm("Выйти из группы?")) {
            await updateDoc(doc(db, "chats", activeChatId), { users: arrayRemove(currentUser.email) });
            closeChat();
            document.getElementById('group-opts-modal').classList.add('hidden');
        }
    };

    function closeChat() {
        activeChatId = null;
        document.getElementById('app-screen').classList.remove('chat-open');
        document.getElementById('message-form').classList.remove('visible');
    }

    document.getElementById('btn-back').onclick = closeChat;
    document.getElementById('message-form').onsubmit = async e => {
        e.preventDefault();
        const input = document.getElementById('message-input');
        if(!input.value.trim() || !activeChatId) return;
        await addDoc(collection(db, "chats", activeChatId, "messages"), {
            text: input.value, sender: currentUser.email, timestamp: serverTimestamp()
        });
        input.value = '';
    };

    document.getElementById('btn-login-action').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
    document.getElementById('btn-reg-action').onclick = () => createUserWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
