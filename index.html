<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether // Neon Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Экран авторизации -->
    <div id="auth-container" class="glass-card">
        <h1 class="logo">AETHER</h1>
        <div class="auth-box">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <div class="auth-buttons">
                <button id="btn-login" class="btn-primary">Войти</button>
                <button id="btn-register" class="btn-secondary">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Основной интерфейс мессенджера -->
    <div id="messenger-container" class="hidden">
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-placeholder"></div>
                    <span id="current-user-email"></span>
                </div>
                <button id="btn-logout" class="btn-icon">Logout</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="new-chat-email" placeholder="Email собеседника...">
                <button id="btn-add-chat">+</button>
            </div>

            <div id="chats-list" class="chats-list">
                <!-- Чаты будут загружаться здесь -->
            </div>
        </aside>

        <main class="chat-window glass">
            <div id="chat-header" class="chat-header">
                <h3 id="active-chat-name">Выберите чат</h3>
            </div>

            <div id="messages-display" class="messages-display">
                <!-- Сообщения будут здесь -->
            </div>

            <form id="message-form" class="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                <button type="submit" id="btn-send">Отправить</button>
            </form>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
