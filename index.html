<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container">
        <div class="glass-card">
            <h1 class="logo">AETHER</h1>
            <div class="auth-box">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Пароль">
                <button id="btn-login" class="btn-primary">ВОЙТИ</button>
                <button id="btn-register" class="btn-secondary">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
    </div>

    <div id="messenger-container" class="hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <button id="btn-logout">Выйти</button>
            </div>
            <div class="search-bar">
                <input type="email" id="new-chat-email" placeholder="Email собеседника...">
                <button id="btn-add-chat">+</button>
            </div>
            <div class="chats-list" id="chats-list">
                </div>
        </div>

        <div class="chat-window">
            <div class="chat-header">
                <h3 id="current-chat-title">Выберите чат</h3>
            </div>
            <div class="messages-display" id="messages-display">
                </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение...">
                <button id="btn-send">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    </body>
</html>
