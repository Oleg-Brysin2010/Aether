<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-card glass">
            <div class="auth-header">
                <h1>Aether</h1>
                <p>Добро пожаловать в эфир</p>
            </div>
            <div class="auth-form">
                <input type="text" id="auth-name" placeholder="Ваше имя">
                <input type="email" id="auth-email" placeholder="Email">
                <input type="password" id="auth-pass" placeholder="Пароль">
                <div class="auth-buttons">
                    <button id="btn-login">Войти</button>
                    <button id="btn-register" class="secondary">Регистрация</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <aside class="sidebar glass" id="sidebar">
            <div class="sidebar-header">
                <span id="current-user-name">User</span>
                <div class="header-actions">
                    <button id="btn-create-chat"><i class="fas fa-plus"></i></button>
                    <button id="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div id="chat-list" class="chat-list"></div>
        </aside>

        <main class="chat-area glass" id="chat-area">
            <div id="no-chat-selected" class="empty-state">
                <i class="fas fa-comment-dots"></i>
                <p>Выберите чат</p>
            </div>
            <div id="active-chat" class="hidden">
                <header class="chat-header">
                    <button id="btn-back"><i class="fas fa-arrow-left"></i></button>
                    <h2 id="chat-with-name">Чат</h2>
                </header>
                <div id="messages-container" class="messages-container"></div>
                <form id="message-form" class="message-input-area">
                    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
                    <button type="submit"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
